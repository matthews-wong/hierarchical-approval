name: Publish

# Publishes to npm when a version tag (vX.Y.Z) is pushed, or manually via the
# Actions tab. Auth uses npm Trusted Publishing (OIDC) when configured — no
# secret needed — and falls back to an NPM_TOKEN secret if one is set.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dist-tag:
        description: 'npm dist-tag to publish under'
        default: 'latest'
        required: false

permissions:
  contents: read
  id-token: write # required for npm provenance + Trusted Publishing via OIDC

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          # Do NOT enable cache in release builds — ensures a clean, reproducible install

      - name: Upgrade npm (Trusted Publishing/OIDC requires npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Audit (block on high/critical CVEs)
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Guard — tag must match package.json version
        if: github.event_name == 'push'
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Generate SBOM (CycloneDX)
        run: npx --yes @cyclonedx/cyclonedx-npm --validate --output-file sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      - name: Publish with provenance
        run: npm publish --provenance --access public --tag "${{ github.event.inputs.dist-tag || 'latest' }}"
        env:
          # Empty when using Trusted Publishing (OIDC); set the NPM_TOKEN secret to use a token instead.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
